<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful - Vocal Star 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Shared Design System Variables */
        :root {
            --primary: #FF3C81; 
            --secondary: #00D2FC; 
            --accent: #FFD700; 
            --dark-bg: #100C1F; 
            --card-bg: #1E1A33; 
            --text-main: #FFFFFF;
            --text-sub: #AAB; 
            --glow: 0 0 15px rgba(255, 60, 129, 0.6);
            --gradient-light: linear-gradient(135deg, var(--primary), var(--secondary));
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Roboto', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--dark-bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle ambient stage lighting circles in the background */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 60, 129, 0.1) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 252, 0.08) 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            pointer-events: none;
        }

        .success-card {
            max-width: 650px;
            width: 90%;
            background: rgba(30, 26, 51, 0.85);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: scaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success-icon {
            font-size: 5rem;
            color: var(--secondary);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(0, 210, 252, 0.6));
            animation: pulse-icon 2s infinite ease-in-out;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--gradient-light);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .user-name {
            color: var(--primary);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 60, 129, 0.3);
        }

        /* Go to Main Page Button Style */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--gradient-light);
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 60, 129, 0.5);
        }

        .btn i {
            margin-right: 10px;
        }

        /* Animations */
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(0, 210, 252, 0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(0, 210, 252, 0.9)); }
        }

        @media (max-width: 480px) {
            .success-card { padding: 40px 20px; }
            h1 { font-size: 2rem; }
            .message { font-size: 1rem; }
            .btn { padding: 12px 30px; font-size: 1rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" />
</head>
<body>

    <div class="success-card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Application Received</h1>
        
        <p class="message">
            Hi <span id="displayName" class="user-name">Artist</span>, Your Application has been successfully registered. <br> Thank you for being part of this competition. <br> We will contact you soon.
        </p>
        
        <a href="index.html" class="btn">
            <i class="fas fa-home"></i> Go To Main Page
        </a>
    </div>

    <script>
        // Grab the name from URL parameters so it changes dynamically based on the submitter
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const nameParam = urlParams.get('name');
            
            if (nameParam) {
                // Decode formatting to ensure clean spacing
                document.getElementById('displayName').textContent = decodeURIComponent(nameParam);
            }
        });
    </script>
</body>
</html>
